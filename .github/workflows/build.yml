name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download embedded Python
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/astral-sh/python-build-standalone/releases/download/20260303/cpython-3.11.15+20260303-x86_64-pc-windows-msvc-install_only_stripped.tar.gz" -OutFile python-embed.tar.gz
          mkdir python-embed
          tar -xzf python-embed.tar.gz -C python-embed
          if (Test-Path python-embed\python) {
            Get-ChildItem python-embed\python | Move-Item -Destination python-embed\
            Remove-Item python-embed\python
          }

      - name: Install packages into embed
        shell: cmd
        run: |
          python-embed\python.exe -m ensurepip --upgrade
          python-embed\python.exe -m pip install --upgrade pip
          python-embed\python.exe -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          python-embed\python.exe -m pip install --no-deps https://nazca-design.org/dist/nazca-0.6.1.tar.gz
          python-embed\python.exe -m pip install gdstk || echo "using fallback gdstk.py"

      - name: Install IHP PDK
        shell: cmd
        run: |
          cd pdk && powershell -Command "Expand-Archive -Path IHP_PDK_Nazca_PreDev_V02.zip -DestinationPath . -Force" && cd ..
          python-embed\python.exe -m pip install -e pdk\IHP_PDK_Nazca_PreDev_V02 || xcopy /E /I /Q pdk\IHP_PDK_Nazca_PreDev_V02\IHP_PDK python-embed\Lib\site-packages\IHP_PDK

      - name: Patch and configure
        run: |
          python scripts/app_patch.py
          mkdir config -ErrorAction SilentlyContinue
          echo '{"mode": "production", "sheetId": "1EYlnpDJWFEHssugRB7OmzZA9wF9IReLfc2V3JSyRsmc"}' > config/license_config.json
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > config/google_credentials.json

      - name: Build installer
        working-directory: electron
        run: |
          npm install
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-Windows
          path: build/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download embedded Python
        run: |
          curl -L -o python-embed.tar.gz "https://github.com/astral-sh/python-build-standalone/releases/download/20260303/cpython-3.11.15+20260303-aarch64-apple-darwin-install_only_stripped.tar.gz"
          mkdir -p python-embed
          tar -xzf python-embed.tar.gz -C python-embed
          [ -d "python-embed/python" ] && mv python-embed/python/* python-embed/ && rmdir python-embed/python

      - name: Install packages into embed
        run: |
          python-embed/bin/python3 -m ensurepip --upgrade
          python-embed/bin/python3 -m pip install --upgrade pip
          python-embed/bin/python3 -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          python-embed/bin/python3 -m pip install --no-deps https://nazca-design.org/dist/nazca-0.6.1.tar.gz
          python-embed/bin/python3 -m pip install gdstk || echo "using fallback"

      - name: Install IHP PDK
        run: |
          cd pdk && unzip -o IHP_PDK_Nazca_PreDev_V02.zip && cd ..
          python-embed/bin/python3 -m pip install -e pdk/IHP_PDK_Nazca_PreDev_V02 || cp -r pdk/IHP_PDK_Nazca_PreDev_V02/IHP_PDK python-embed/lib/python3.11/site-packages/

      - name: Patch and configure
        run: |
          python3 scripts/app_patch.py
          mkdir -p config
          echo '{"mode": "production", "sheetId": "1EYlnpDJWFEHssugRB7OmzZA9wF9IReLfc2V3JSyRsmc"}' > config/license_config.json
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > config/google_credentials.json

      - name: Build DMG
        working-directory: electron
        run: |
          npm install
          npx electron-builder --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-macOS
          path: build/*.dmg
