name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download embedded Python
        shell: powershell
        run: |
          $url = "https://github.com/astral-sh/python-build-standalone/releases/download/20250612/cpython-3.11.12+20250612-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile python-embed.tar.gz
          mkdir python-embed
          tar -xzf python-embed.tar.gz -C python-embed
          if (Test-Path python-embed/python) {
            Get-ChildItem python-embed/python | Move-Item -Destination python-embed/
            Remove-Item python-embed/python
          }

      - name: Install Python packages
        shell: cmd
        run: |
          python-embed\python.exe -m ensurepip --upgrade
          python-embed\python.exe -m pip install --upgrade pip
          python-embed\python.exe -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          python-embed\python.exe -m pip install --no-deps https://nazca-design.org/dist/nazca-0.6.1.tar.gz
          python-embed\python.exe -m pip install gdstk || echo "gdstk failed, using pure-python fallback"

      - name: Install IHP PDK
        shell: cmd
        run: |
          cd pdk && powershell -Command "Expand-Archive -Path IHP_PDK_Nazca_PreDev_V02.zip -DestinationPath . -Force" && cd ..
          python-embed\python.exe -m pip install -e pdk\IHP_PDK_Nazca_PreDev_V02 || xcopy /E /I /Q pdk\IHP_PDK_Nazca_PreDev_V02\IHP_PDK python-embed\Lib\site-packages\IHP_PDK

      - name: Patch app.py
        run: python scripts/app_patch.py

      - name: Create config
        shell: cmd
        run: |
          if not exist config mkdir config
          echo {"mode": "demo"} > config\license_config.json

      - name: Install Node dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-Windows-x64
          path: build/*.exe

  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download embedded Python
        run: |
          curl -L -o python-embed.tar.gz "https://github.com/astral-sh/python-build-standalone/releases/download/20250612/cpython-3.11.12+20250612-x86_64-apple-darwin-install_only_stripped.tar.gz"
          mkdir -p python-embed
          tar -xzf python-embed.tar.gz -C python-embed
          if [ -d "python-embed/python" ]; then
            mv python-embed/python/* python-embed/
            rmdir python-embed/python
          fi

      - name: Install Python packages
        run: |
          python-embed/bin/python3 -m ensurepip --upgrade
          python-embed/bin/python3 -m pip install --upgrade pip
          python-embed/bin/python3 -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          python-embed/bin/python3 -m pip install --no-deps https://nazca-design.org/dist/nazca-0.6.1.tar.gz
          python-embed/bin/python3 -m pip install gdstk || echo "gdstk fallback"

      - name: Install IHP PDK
        run: |
          cd pdk && unzip -o IHP_PDK_Nazca_PreDev_V02.zip && cd ..
          python-embed/bin/python3 -m pip install -e pdk/IHP_PDK_Nazca_PreDev_V02 || cp -r pdk/IHP_PDK_Nazca_PreDev_V02/IHP_PDK python-embed/lib/python3.11/site-packages/

      - name: Patch app.py
        run: python3 scripts/app_patch.py

      - name: Create config
        run: |
          mkdir -p config
          echo '{"mode": "demo"}' > config/license_config.json

      - name: Install Node dependencies
        working-directory: electron
        run: npm install

      - name: Build macOS DMG
        working-directory: electron
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-macOS
          path: build/*.dmg
