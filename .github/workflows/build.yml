name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Create embedded Python from setup-python ────────────────
      - name: Create embedded Python
        shell: powershell
        run: |
          $pythonPath = (Get-Command python).Source
          $pythonDir = Split-Path (Split-Path $pythonPath)
          mkdir python-embed -ErrorAction SilentlyContinue
          Copy-Item -Path "$pythonDir\*" -Destination "python-embed\" -Recurse -Force
          if (-not (Test-Path "python-embed\python.exe")) {
            $prefix = python -c "import sys; print(sys.prefix)"
            Copy-Item -Path "$prefix\*" -Destination "python-embed\" -Recurse -Force
          }
          python-embed\python.exe --version

      # ─── Install Python packages into embedded Python ──────────────
      - name: Install Python packages
        shell: cmd
        run: |
          if exist python-embed\python.exe (
            set PY=python-embed\python.exe
          ) else (
            set PY=python
          )
          %PY% -m pip install --upgrade pip
          %PY% -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          %PY% -m pip install gdstk || echo "gdstk not available, using pure-python fallback"

      - name: Install Nazca
        shell: bash
        run: |
          curl -L -A "Mozilla/5.0" -o nazca-0.6.1.tar.gz "https://nazca-design.org/dist/nazca-0.6.1.tar.gz"
          if [ -f python-embed/python.exe ]; then
            PY="python-embed/python.exe"
          else
            PY="python"
          fi
          $PY -m pip install --no-deps nazca-0.6.1.tar.gz
          $PY -c "import flask; import nazca; print('All packages OK')"

      # ─── Install IHP PDK into embedded Python ─────────────────────
      - name: Install IHP PDK
        shell: cmd
        run: |
          cd pdk
          powershell -Command "Expand-Archive -Path IHP_PDK_Nazca_PreDev_V02.zip -DestinationPath . -Force"
          cd ..
          if exist python-embed\python.exe (
            python-embed\python.exe -m pip install -e pdk\IHP_PDK_Nazca_PreDev_V02 || xcopy /E /I /Q pdk\IHP_PDK_Nazca_PreDev_V02\IHP_PDK python-embed\Lib\site-packages\IHP_PDK
          ) else (
            python -m pip install -e pdk\IHP_PDK_Nazca_PreDev_V02
          )

      # ─── Patch app.py ─────────────────────────────────────────────
      - name: Patch app.py for Electron
        run: python scripts/app_patch.py

      # ─── Setup config ─────────────────────────────────────────────
      - name: Create config
        shell: cmd
        run: |
          if not exist config mkdir config
          echo {"mode": "demo"} > config\license_config.json

      # ─── Install Node.js dependencies ─────────────────────────────
      - name: Install Node dependencies
        working-directory: electron
        run: npm install

      # ─── Build Windows installer ──────────────────────────────────
      - name: Build Windows x64 installer
        working-directory: electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Upload artifact ──────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-Windows-x64
          path: build/*.exe

  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Use setup-python as embedded Python ────────────────────────
      - name: Create embedded Python
        run: |
          PYTHON_PATH=$(which python3)
          PYTHON_DIR=$(dirname $(dirname $PYTHON_PATH))
          mkdir -p python-embed
          cp -r $PYTHON_DIR/* python-embed/ 2>/dev/null || true
          # Ensure python3 binary exists
          if [ ! -f "python-embed/bin/python3" ]; then
            cp -r $(python3 -c "import sys; print(sys.prefix)")/* python-embed/
          fi
          python-embed/bin/python3 --version || python3 --version

      # ─── Install Python packages ──────────────────────────────────
      - name: Install Python packages into embed
        run: |
          PY="python-embed/bin/python3"
          if [ ! -f "$PY" ]; then PY="python3"; fi
          $PY -m pip install --upgrade pip
          $PY -m pip install flask flask-cors numpy scipy pandas matplotlib Pillow PyYAML ipython pyclipper
          $PY -m pip install gdstk || echo "gdstk not available, using fallback"

      - name: Install Nazca
        run: |
          PY="python-embed/bin/python3"
          if [ ! -f "$PY" ]; then PY="python3"; fi
          curl -L -A "Mozilla/5.0" -o nazca-0.6.1.tar.gz "https://nazca-design.org/dist/nazca-0.6.1.tar.gz"
          $PY -m pip install --no-deps nazca-0.6.1.tar.gz
          $PY -c "import flask; import nazca; print('All packages OK')"

      # ─── Install IHP PDK ──────────────────────────────────────────
      - name: Install IHP PDK
        run: |
          PY="python-embed/bin/python3"
          if [ ! -f "$PY" ]; then PY="python3"; fi
          cd pdk && unzip -o IHP_PDK_Nazca_PreDev_V02.zip && cd ..
          $PY -m pip install -e pdk/IHP_PDK_Nazca_PreDev_V02 || cp -r pdk/IHP_PDK_Nazca_PreDev_V02/IHP_PDK python-embed/lib/python3.11/site-packages/ 2>/dev/null || true

      # ─── Patch + config ────────────────────────────────────────────
      - name: Patch app.py
        run: python3 scripts/app_patch.py

      - name: Create config
        run: |
          mkdir -p config
          echo '{"mode": "demo"}' > config/license_config.json

      # ─── Install Node.js dependencies ─────────────────────────────
      - name: Install Node dependencies
        working-directory: electron
        run: npm install

      # ─── Build macOS DMG ──────────────────────────────────────────
      - name: Build macOS DMG (x64 + ARM)
        working-directory: electron
        run: |
          npx electron-builder --mac --x64
          npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Upload artifacts ─────────────────────────────────────────
      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: PhotonicDesigner-macOS
          path: build/*.dmg